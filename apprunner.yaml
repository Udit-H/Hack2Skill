version: 1.0
runtime: python3

build:
  commands:
    pre-build:
      - yum install -y cairo-devel pkgconfig
      - python3 -m pip install --upgrade pip
    build:
      - python3 -m pip install -r backend/requirements.txt

run:
  runtime-version: 3.11
  command: python3 -m uvicorn --app-dir backend main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: PORT
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: AWS_REGION
      value: "us-east-1"
